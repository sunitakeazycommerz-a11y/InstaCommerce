# Great Expectations validation suite for orders
#
# Validates the orders dataset landing in BigQuery.
# Run via: python run_quality_checks.py --suite orders

expectation_suite:
  name: orders_validation
  expectations:
    - expectation_type: expect_column_values_to_not_be_null
      kwargs:
        column: order_id
    - expectation_type: expect_column_values_to_not_be_null
      kwargs:
        column: user_id
    - expectation_type: expect_column_values_to_be_between
      kwargs:
        column: total_cents
        min_value: 0
        max_value: 10000000
    - expectation_type: expect_column_values_to_be_in_set
      kwargs:
        column: status
        value_set: [PENDING, PLACED, PACKING, PACKED, OUT_FOR_DELIVERY, DELIVERED, CANCELLED, FAILED]
    - expectation_type: expect_table_row_count_to_be_between
      kwargs:
        min_value: 100000
        max_value: 2000000
    - expectation_type: expect_column_values_to_be_unique
      kwargs:
        column: order_id
    - expectation_type: expect_column_values_to_not_be_null
      kwargs:
        column: store_id
    - expectation_type: expect_column_values_to_not_be_null
      kwargs:
        column: placed_at
    - expectation_type: expect_column_values_to_be_between
      kwargs:
        column: item_count
        min_value: 1
        max_value: 500
