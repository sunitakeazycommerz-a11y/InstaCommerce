# Great Expectations validation suite for payments
#
# Validates the payments dataset landing in BigQuery.
# Run via: python run_quality_checks.py --suite payments

expectation_suite:
  name: payments_validation
  expectations:
    - expectation_type: expect_column_values_to_not_be_null
      kwargs:
        column: payment_id
    - expectation_type: expect_column_values_to_be_unique
      kwargs:
        column: payment_id
    - expectation_type: expect_column_values_to_not_be_null
      kwargs:
        column: order_id
    - expectation_type: expect_column_values_to_be_in_set
      kwargs:
        column: status
        value_set: [INITIATED, PROCESSING, SUCCESS, FAILED, DECLINED, REFUNDED, REVERSED]
    - expectation_type: expect_column_values_to_be_in_set
      kwargs:
        column: method
        value_set: [UPI, CREDIT_CARD, DEBIT_CARD, NET_BANKING, WALLET, COD]
    - expectation_type: expect_column_values_to_be_between
      kwargs:
        column: amount_cents
        min_value: 0
        max_value: 10000000
    - expectation_type: expect_column_values_to_be_between
      kwargs:
        column: latency_ms
        min_value: 0
        max_value: 120000
    - expectation_type: expect_table_row_count_to_be_between
      kwargs:
        min_value: 100000
        max_value: 2000000
