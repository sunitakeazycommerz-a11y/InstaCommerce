name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: asia-south1-docker.pkg.dev/instacommerce/images
  GCP_PROJECT_ID: instacommerce
  JAVA_VERSION: '21'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      changed_services: ${{ steps.set-matrix.outputs.changed_services }}
      go_services: ${{ steps.set-go-matrix.outputs.go_services }}
      changed_go_services: ${{ steps.set-go-matrix.outputs.changed_go_services }}
      python_services: ${{ steps.set-python-matrix.outputs.python_services }}
      changed_python_services: ${{ steps.set-python-matrix.outputs.changed_python_services }}
      cloud_publish_configured: ${{ steps.check-cloud-creds.outputs.configured }}
      contracts_changed: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            identity-service: 'services/identity-service/**'
            catalog-service: 'services/catalog-service/**'
            inventory-service: 'services/inventory-service/**'
            order-service: 'services/order-service/**'
            payment-service: 'services/payment-service/**'
            fulfillment-service: 'services/fulfillment-service/**'
            notification-service: 'services/notification-service/**'
            search-service: 'services/search-service/**'
            pricing-service: 'services/pricing-service/**'
            cart-service: 'services/cart-service/**'
            checkout-orchestrator-service: 'services/checkout-orchestrator-service/**'
            warehouse-service: 'services/warehouse-service/**'
            rider-fleet-service: 'services/rider-fleet-service/**'
            routing-eta-service: 'services/routing-eta-service/**'
            wallet-loyalty-service: 'services/wallet-loyalty-service/**'
            audit-trail-service: 'services/audit-trail-service/**'
            fraud-detection-service: 'services/fraud-detection-service/**'
            config-feature-flag-service: 'services/config-feature-flag-service/**'
            mobile-bff-service: 'services/mobile-bff-service/**'
            admin-gateway-service: 'services/admin-gateway-service/**'
            contracts:
              - 'contracts/src/**'
              - 'contracts/build.gradle.kts'
            java-shared:
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
            go-shared: 'services/go-shared/**'
            cdc-consumer-service: 'services/cdc-consumer-service/**'
            dispatch-optimizer-service: 'services/dispatch-optimizer-service/**'
            location-ingestion-service: 'services/location-ingestion-service/**'
            outbox-relay-service: 'services/outbox-relay-service/**'
            payment-webhook-service: 'services/payment-webhook-service/**'
            reconciliation-engine: 'services/reconciliation-engine/**'
            stream-processor-service: 'services/stream-processor-service/**'
            ai-orchestrator-service:
              - 'services/ai-orchestrator-service/**'
            ai-inference-service:
              - 'services/ai-inference-service/**'
      - id: set-matrix
        run: |
          all_services=(identity-service catalog-service inventory-service order-service payment-service fulfillment-service notification-service search-service pricing-service cart-service checkout-orchestrator-service warehouse-service rider-fleet-service routing-eta-service wallet-loyalty-service audit-trail-service fraud-detection-service config-feature-flag-service mobile-bff-service admin-gateway-service)
          changed_services=()
          [[ "${{ steps.filter.outputs.identity-service }}" == "true" ]] && changed_services+=("identity-service")
          [[ "${{ steps.filter.outputs.catalog-service }}" == "true" ]] && changed_services+=("catalog-service")
          [[ "${{ steps.filter.outputs.inventory-service }}" == "true" ]] && changed_services+=("inventory-service")
          [[ "${{ steps.filter.outputs.order-service }}" == "true" ]] && changed_services+=("order-service")
          [[ "${{ steps.filter.outputs.payment-service }}" == "true" ]] && changed_services+=("payment-service")
          [[ "${{ steps.filter.outputs.fulfillment-service }}" == "true" ]] && changed_services+=("fulfillment-service")
          [[ "${{ steps.filter.outputs.notification-service }}" == "true" ]] && changed_services+=("notification-service")
          [[ "${{ steps.filter.outputs.search-service }}" == "true" ]] && changed_services+=("search-service")
          [[ "${{ steps.filter.outputs.pricing-service }}" == "true" ]] && changed_services+=("pricing-service")
          [[ "${{ steps.filter.outputs.cart-service }}" == "true" ]] && changed_services+=("cart-service")
          [[ "${{ steps.filter.outputs.checkout-orchestrator-service }}" == "true" ]] && changed_services+=("checkout-orchestrator-service")
          [[ "${{ steps.filter.outputs.warehouse-service }}" == "true" ]] && changed_services+=("warehouse-service")
          [[ "${{ steps.filter.outputs.rider-fleet-service }}" == "true" ]] && changed_services+=("rider-fleet-service")
          [[ "${{ steps.filter.outputs.routing-eta-service }}" == "true" ]] && changed_services+=("routing-eta-service")
          [[ "${{ steps.filter.outputs.wallet-loyalty-service }}" == "true" ]] && changed_services+=("wallet-loyalty-service")
          [[ "${{ steps.filter.outputs.audit-trail-service }}" == "true" ]] && changed_services+=("audit-trail-service")
          [[ "${{ steps.filter.outputs.fraud-detection-service }}" == "true" ]] && changed_services+=("fraud-detection-service")
          [[ "${{ steps.filter.outputs.config-feature-flag-service }}" == "true" ]] && changed_services+=("config-feature-flag-service")
          [[ "${{ steps.filter.outputs.mobile-bff-service }}" == "true" ]] && changed_services+=("mobile-bff-service")
          [[ "${{ steps.filter.outputs.admin-gateway-service }}" == "true" ]] && changed_services+=("admin-gateway-service")
          if [[ "${{ steps.filter.outputs.java-shared }}" == "true" ]]; then
            changed_services=("${all_services[@]}")
          fi
          if [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ) ]]; then
            services=("${all_services[@]}")
          elif [ ${#changed_services[@]} -eq 0 ]; then
            services=()
          else
            services=("${changed_services[@]}")
          fi
          services_json=$(jq -cn '$ARGS.positional' --args "${services[@]}")
          changed_services_json=$(jq -cn '$ARGS.positional' --args "${changed_services[@]}")
          echo "services=$services_json" >> "$GITHUB_OUTPUT"
          echo "changed_services=$changed_services_json" >> "$GITHUB_OUTPUT"
      - id: set-go-matrix
        run: |
          all_go_services=(go-shared cdc-consumer-service dispatch-optimizer-service location-ingestion-service outbox-relay-service payment-webhook-service reconciliation-engine stream-processor-service)
          changed_go_services=()

          if [[ "${{ steps.filter.outputs.go-shared }}" == "true" ]]; then
            changed_go_services=("${all_go_services[@]}")
          else
            [[ "${{ steps.filter.outputs.cdc-consumer-service }}" == "true" ]] && changed_go_services+=("cdc-consumer-service")
            [[ "${{ steps.filter.outputs.dispatch-optimizer-service }}" == "true" ]] && changed_go_services+=("dispatch-optimizer-service")
            [[ "${{ steps.filter.outputs.location-ingestion-service }}" == "true" ]] && changed_go_services+=("location-ingestion-service")
            [[ "${{ steps.filter.outputs.outbox-relay-service }}" == "true" ]] && changed_go_services+=("outbox-relay-service")
            [[ "${{ steps.filter.outputs.payment-webhook-service }}" == "true" ]] && changed_go_services+=("payment-webhook-service")
            [[ "${{ steps.filter.outputs.reconciliation-engine }}" == "true" ]] && changed_go_services+=("reconciliation-engine")
            [[ "${{ steps.filter.outputs.stream-processor-service }}" == "true" ]] && changed_go_services+=("stream-processor-service")
          fi

          if [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ) ]]; then
            go_services=("${all_go_services[@]}")
          elif [ ${#changed_go_services[@]} -eq 0 ]; then
            go_services=()
          else
            go_services=("${changed_go_services[@]}")
          fi

          go_services_json=$(jq -cn '$ARGS.positional' --args "${go_services[@]}")
          changed_go_services_json=$(jq -cn '$ARGS.positional' --args "${changed_go_services[@]}")
          echo "go_services=$go_services_json" >> "$GITHUB_OUTPUT"
          echo "changed_go_services=$changed_go_services_json" >> "$GITHUB_OUTPUT"
      - id: set-python-matrix
        run: |
          all_python_services=(ai-orchestrator-service ai-inference-service)
          changed_python_services=()

          [[ "${{ steps.filter.outputs.ai-orchestrator-service }}" == "true" ]] && changed_python_services+=("ai-orchestrator-service")
          [[ "${{ steps.filter.outputs.ai-inference-service }}" == "true" ]] && changed_python_services+=("ai-inference-service")

          if [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ) ]]; then
            python_services=("${all_python_services[@]}")
          elif [ ${#changed_python_services[@]} -eq 0 ]; then
            python_services=()
          else
            python_services=("${changed_python_services[@]}")
          fi

          python_services_json=$(jq -cn '$ARGS.positional' --args "${python_services[@]}")
          changed_python_services_json=$(jq -cn '$ARGS.positional' --args "${changed_python_services[@]}")
          echo "python_services=$python_services_json" >> "$GITHUB_OUTPUT"
          echo "changed_python_services=$changed_python_services_json" >> "$GITHUB_OUTPUT"
      - name: Check cloud publish credentials
        id: check-cloud-creds
        run: |
          if [[ -n "$WIP" && -n "$SA" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
              echo "::notice::Cloud publish credentials are configured. Image push and deploy-dev will proceed."
            fi
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
              echo "::warning::Cloud publish credentials (GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT) are not configured. Artifact Registry push and deploy-dev will be skipped. Set these as repository secrets or variables to enable publishing."
            fi
          fi
        env:
          WIP: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER || '' }}
          SA: ${{ secrets.GCP_SERVICE_ACCOUNT || vars.GCP_SERVICE_ACCOUNT || '' }}

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: ${{ github.event_name == 'pull_request' && '0' || '1' }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check dependency graph availability
        id: dependency-graph
        uses: actions/github-script@v8
        with:
          script: |
            let dependencyGraphAvailable = false;
            try {
              await github.request('GET /repos/{owner}/{repo}/dependency-graph/sbom', {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.info('Dependency graph is available.');
              dependencyGraphAvailable = true;
            } catch (error) {
              const status = error.status || 0;
              if (status === 403 || status === 404) {
                core.notice(`Dependency review skipped: dependency graph unavailable or disabled (${status}).`);
              } else {
                throw error;
              }
            }

            let dependencyReviewSupported = true;
            try {
              const repoResponse = await github.request('GET /repos/{owner}/{repo}', {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              const isPrivateRepo = Boolean(repoResponse.data.private);
              const advancedSecurityStatus = repoResponse.data.security_and_analysis?.advanced_security?.status;
              dependencyReviewSupported = !isPrivateRepo || advancedSecurityStatus === 'enabled';
              if (!dependencyReviewSupported) {
                core.notice('Dependency review skipped: repository is private and GitHub Advanced Security is not enabled.');
              }
            } catch (error) {
              const status = error.status || 0;
              if (status === 403 || status === 404) {
                const isPrivateRepo = Boolean(context.payload.repository?.private);
                dependencyReviewSupported = !isPrivateRepo;
                if (!dependencyReviewSupported) {
                  core.notice(`Dependency review skipped: unable to verify GitHub Advanced Security support (${status}).`);
                }
              } else {
                throw error;
              }
            }

            const shouldRunDependencyReview = dependencyGraphAvailable && dependencyReviewSupported;
            core.setOutput('available', shouldRunDependencyReview ? 'true' : 'false');
      - name: Run dependency review
        if: steps.dependency-graph.outputs.available == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
      - name: Dependency review skipped
        if: steps.dependency-graph.outputs.available != 'true'
        run: echo "Skipping dependency review because dependency graph is unavailable or disabled for this repository."

  build-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run tests
        run: ./gradlew :services:${{ matrix.service }}:test --no-daemon
      - name: Build bootJar
        run: ./gradlew :services:${{ matrix.service }}:bootJar --no-daemon
      - name: Build Image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}
      - name: Scan image vulnerabilities
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Authenticate to Google Cloud
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT || vars.GCP_SERVICE_ACCOUNT }}
      - name: Configure Docker auth
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet
      - name: Push to Artifact Registry
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        run: docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}

  go-build-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go_services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.go_services) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache: true
          cache-dependency-path: |
            services/${{ matrix.service }}/go.sum
            services/go-shared/go.sum
      - name: Download dependencies
        working-directory: services/${{ matrix.service }}
        run: go mod download
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./...
      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -f services/${{ matrix.service }}/Dockerfile \
            services/${{ matrix.service }}

      - name: Trivy vulnerability scan
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.detect-changes.outputs.cloud_publish_configured == 'true'
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}

  python-build-test:
    name: Python Build & Test (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_python_services > 0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.python_services) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true
      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio
      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          pytest -v tests/ || echo "No tests found, skipping"
      - name: Docker build
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker build -t ${{ matrix.service }}:${{ github.sha }} services/${{ matrix.service }}
      - name: Trivy scan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  contract-validation:
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts_changed == 'true' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build contracts (proto + schemas)
        run: ./gradlew :contracts:build --no-daemon
      - name: Validate JSON event schemas
        run: |
          echo "Validating all JSON schema files are well-formed..."
          find contracts/src/main/resources/schemas -name '*.json' -print0 | while IFS= read -r -d '' file; do
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "INVALID JSON: $file"
              exit 1
            fi
          done
          echo "All JSON schema files are valid."
      - name: Check for breaking proto changes
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking for proto field removals or type changes against base branch..."
          git diff origin/${{ github.base_ref }}...HEAD -- contracts/src/main/proto/ > /tmp/proto-diff.txt || true
          if grep -qE '^\-\s+(required|optional|repeated)?\s*(string|int32|int64|bool|bytes|double|float|message|enum)\s+' /tmp/proto-diff.txt 2>/dev/null; then
            echo "::warning::Potential breaking change detected in proto files. Review the diff carefully."
            echo "--- Proto diff ---"
            cat /tmp/proto-diff.txt
          else
            echo "No breaking proto field removals detected."
          fi

  deploy-dev:
    needs: [detect-changes, security-scan, build-test, go-build-test, contract-validation]
    if: >-
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      && github.actor != 'github-actions[bot]'
      && needs.detect-changes.outputs.cloud_publish_configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        uses: mikefarah/yq@v4
      - name: Update Helm values
        run: |
          declare -a deploy_services=()
          declare -A seen_services=()
          declare -A go_service_to_helm=(
            ["cdc-consumer-service"]="cdc-consumer"
            ["dispatch-optimizer-service"]="dispatch-optimizer-service"
            ["location-ingestion-service"]="location-ingestion"
            ["outbox-relay-service"]="outbox-relay"
            ["payment-webhook-service"]="payment-webhook"
            ["reconciliation-engine"]="reconciliation-engine"
            ["stream-processor-service"]="stream-processor-service"
          )

          while IFS= read -r svc; do
            [[ -z "$svc" ]] && continue
            deploy_services+=("$svc")
          done < <(echo '${{ needs.detect-changes.outputs.changed_services }}' | jq -r '.[]')

          while IFS= read -r svc; do
            [[ -z "$svc" || "$svc" == "go-shared" ]] && continue
            deploy_services+=("${go_service_to_helm[$svc]:-$svc}")
          done < <(echo '${{ needs.detect-changes.outputs.changed_go_services }}' | jq -r '.[]')

          for svc in "${deploy_services[@]}"; do
            [[ -n "${seen_services[$svc]}" ]] && continue
            seen_services[$svc]=1

            if [[ "$(yq e ".services[\"${svc}\"]" deploy/helm/values-dev.yaml)" == "null" ]]; then
              echo "Skipping ${svc}; not present in deploy/helm/values-dev.yaml"
              continue
            fi

            yq -i ".services[\"${svc}\"].tag = \"${{ github.sha }}\"" deploy/helm/values-dev.yaml
          done
      - name: Commit and push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/values-dev.yaml
          if git diff --cached --quiet; then
            echo "No deployment manifest changes detected."
            exit 0
          fi
          git commit -m "chore: deploy ${GITHUB_SHA::8} to dev [skip ci]"
          git pull --rebase origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
