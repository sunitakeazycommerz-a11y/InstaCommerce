  dispatch-optimizer-service:
    tag: dev
  outbox-relay:
    tag: dev
  cdc-consumer:
    tag: dev
  location-ingestion:
    tag: dev
  payment-webhook:
    tag: dev
  reconciliation-engine:
    tag: dev
  warehouse-service:
    tag: dev
  rider-fleet-service:
    tag: dev
  routing-eta-service:
    tag: dev
  wallet-loyalty-service:
    tag: dev
