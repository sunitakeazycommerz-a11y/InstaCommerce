global:
  image:
    registry: asia-south1-docker.pkg.dev/instacommerce/images
    pullPolicy: IfNotPresent

pdb:
  enabled: true
  maxUnavailable: 1

ingress:
  enabled: false

istio:
  enabled: true
  gateway:
    name: instacommerce-gateway
    hosts:
      - api.instacommerce.dev
      - m.instacommerce.dev
      - admin.instacommerce.dev
    tlsSecret: instacommerce-tls
  virtualService:
    name: api-routing
    hosts:
      - api.instacommerce.dev
      - m.instacommerce.dev
      - admin.instacommerce.dev
  routes:
    - prefix: /api/v1/auth
      service: identity-service
    - prefix: /api/v1/users
      service: identity-service
    - prefix: /api/v1/products
      service: catalog-service
    - prefix: /api/v1/categories
      service: catalog-service
    - prefix: /api/v1/search
      service: search-service
    - prefix: /api/v1/pricing
      service: pricing-service
    - prefix: /api/v1/cart
      service: cart-service
    - prefix: /api/v1/checkout
      service: checkout-orchestrator-service
    - prefix: /api/v1/orders
      service: order-service
    - prefix: /api/v1/fulfillment
      service: fulfillment-service
    - prefix: /api/v1/stores
      service: warehouse-service
    - prefix: /api/v1/riders
      service: rider-fleet-service
    - prefix: /api/v1/deliveries
      service: routing-eta-service
    - prefix: /api/v1/tracking
      service: routing-eta-service
    - prefix: /api/v1/notifications
      service: notification-service
    - prefix: /api/v1/wallet
      service: wallet-loyalty-service
    - prefix: /api/v1/loyalty
      service: wallet-loyalty-service
    - prefix: /api/v1/referral
      service: wallet-loyalty-service
    - prefix: /api/v1/fraud
      service: fraud-detection-service
    - prefix: /api/v1/flags
      service: config-feature-flag-service
    - prefix: /api/v1/audit
      service: audit-trail-service
    - prefix: /bff/mobile/v1
      service: mobile-bff-service
    - prefix: /m/v1
      service: mobile-bff-service
    - prefix: /admin/v1
      service: admin-gateway-service
  requestAuthentications:
    - name: payment-service-jwt
      selector:
        app: payment-service
      jwtRules:
        - issuer: instacommerce-identity
          jwksUri: http://identity-service.{{ .Release.Namespace }}.svc.cluster.local/.well-known/jwks.json
    - name: order-service-jwt
      selector:
        app: order-service
      jwtRules:
        - issuer: instacommerce-identity
          jwksUri: http://identity-service.{{ .Release.Namespace }}.svc.cluster.local/.well-known/jwks.json
    - name: checkout-orchestrator-service-jwt
      selector:
        app: checkout-orchestrator-service
      jwtRules:
        - issuer: instacommerce-identity
          jwksUri: http://identity-service.{{ .Release.Namespace }}.svc.cluster.local/.well-known/jwks.json
    - name: inventory-service-jwt
      selector:
        app: inventory-service
      jwtRules:
        - issuer: instacommerce-identity
          jwksUri: http://identity-service.{{ .Release.Namespace }}.svc.cluster.local/.well-known/jwks.json
    - name: admin-gateway-service-jwt
      selector:
        app: admin-gateway-service
      jwtRules:
        - issuer: instacommerce-identity
          jwksUri: http://identity-service.{{ .Release.Namespace }}.svc.cluster.local/.well-known/jwks.json
          forwardOriginalToken: true
  authorizationPolicies:
    - name: payment-service-internal
      selector:
        app: payment-service
      principals:
        - cluster.local/ns/{{ .Release.Namespace }}/sa/order-service
        - cluster.local/ns/{{ .Release.Namespace }}/sa/fulfillment-service
    - name: inventory-service-internal
      selector:
        app: inventory-service
      principals:
        - cluster.local/ns/{{ .Release.Namespace }}/sa/order-service
        - cluster.local/ns/{{ .Release.Namespace }}/sa/fulfillment-service
    - name: admin-gateway-deny-unauthenticated
      selector:
        app: admin-gateway-service
      principals:
        - cluster.local/ns/{{ .Release.Namespace }}/sa/istio-ingressgateway

services:
  identity-service:
    replicas: 2
    image: identity-service
    port: 8080
    resources:
      requests: { cpu: 500m, memory: 768Mi }
      limits: { cpu: 1000m, memory: 1536Mi }
    env:
      SPRING_PROFILES_ACTIVE: gcp
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql:///identity_db?cloudSqlInstance=PROJECT:REGION:INSTANCE&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    hpa:
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70

  catalog-service:
