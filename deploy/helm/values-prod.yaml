global:
  image:
    registry: asia-south1-docker.pkg.dev/instacommerce/prod-images

services:
  identity-service:
    replicas: 3
    tag: prod
  catalog-service:
    replicas: 3
    tag: prod
  inventory-service:
    replicas: 3
    tag: prod
  order-service:
    replicas: 3
    tag: prod
    env:
      ORDER_CHECKOUT_DIRECT_SAGA_ENABLED: "false"
      ORDER_CHOREOGRAPHY_FULFILLMENT_CONSUMER_ENABLED: "false"
  payment-service:
    replicas: 3
    tag: prod
    env:
      PAYMENT_CHOREOGRAPHY_ORDER_CANCELLED_CONSUMER_ENABLED: "false"
      PAYMENT_WEBHOOK_REFUND_OUTBOX_ENABLED: "false"
      PAYMENT_STALE_PENDING_RECOVERY_ENABLED: "false"
  fulfillment-service:
    replicas: 3
    tag: prod
  notification-service:
    replicas: 2
    tag: prod
  search-service:
    replicas: 2
    tag: prod
    env:
      SPRING_DATA_REDIS_HOST: instacommerce-redis-prod.redis.cache.goog
      SPRING_DATA_REDIS_PORT: "6379"
  pricing-service:
    replicas: 2
    tag: prod
    env:
      SPRING_DATA_REDIS_HOST: instacommerce-redis-prod.redis.cache.goog
      SPRING_DATA_REDIS_PORT: "6379"
  cart-service:
    replicas: 2
    tag: prod
    env:
      SPRING_DATA_REDIS_HOST: instacommerce-redis-prod.redis.cache.goog
      SPRING_DATA_REDIS_PORT: "6379"
  checkout-orchestrator-service:
    replicas: 2
    tag: prod
  ai-orchestrator-service:
    replicas: 2
    tag: prod
  ai-inference-service:
    replicas: 2
    tag: prod
  dispatch-optimizer-service:
    replicas: 2
    tag: prod
  outbox-relay:
    replicas: 2
    tag: prod
  cdc-consumer:
    replicas: 2
    tag: prod
  location-ingestion:
    replicas: 2
    tag: prod
  payment-webhook:
    replicas: 2
    tag: prod
  reconciliation-engine:
    replicas: 2
    tag: prod
  warehouse-service:
    replicas: 2
    tag: prod
  rider-fleet-service:
    replicas: 2
    tag: prod
    env:
      SPRING_DATA_REDIS_HOST: instacommerce-redis-prod.redis.cache.goog
      SPRING_DATA_REDIS_PORT: "6379"
  routing-eta-service:
    replicas: 2
    tag: prod
  wallet-loyalty-service:
    replicas: 2
    tag: prod
    env:
      WALLET_CONSUMER_PAYMENT_REFUND_ENABLED: "false"
  audit-trail-service:
    replicas: 2
    tag: prod
  fraud-detection-service:
    replicas: 2
    tag: prod
  config-feature-flag-service:
    replicas: 2
    tag: prod
    env:
      SPRING_DATA_REDIS_HOST: instacommerce-redis-prod.redis.cache.goog
      SPRING_DATA_REDIS_PORT: "6379"
  mobile-bff-service:
    replicas: 2
    tag: prod
  admin-gateway-service:
    replicas: 2
    tag: prod
