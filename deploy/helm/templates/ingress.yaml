{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: instacommerce-ingress
spec:
  ingressClassName: istio
  rules:
    - host: {{ (index .Values.istio.gateway.hosts 0) | default "api.instacommerce.dev" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8080
{{- end }}
