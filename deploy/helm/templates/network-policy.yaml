{{- if .Values.networkPolicy.enabled }}
{{- range $name, $policy := .Values.istio.servicePolicies }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $name }}-ingress
  namespace: {{ $.Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ $name }}
  policyTypes:
    - Ingress
  ingress:
    {{- range $policy.allowFrom }}
    - from:
        - podSelector:
            matchLabels:
              app: {{ . }}
    {{- end }}
    # Always allow Prometheus scraping and health probes
    - ports:
        - port: metrics
          protocol: TCP
{{- end }}
---
# Default deny for pods not covered by specific policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ $.Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
{{- end }}
