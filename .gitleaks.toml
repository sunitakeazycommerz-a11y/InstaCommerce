title = "InstaCommerce gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Documentation examples with placeholder token fields"
condition = "AND"
regexTarget = "match"
paths = [
  '''^old_docs/01-identity-access\.md$''',
  '''^services/order-service/README\.md$''',
  '''^services/payment-service/README\.md$'''
]
regexes = [
  '''(?i)idempotencyKey''',
  '''(?i)accessToken''',
  '''(?i)refreshToken'''
]
