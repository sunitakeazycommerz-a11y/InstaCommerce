syntax = "proto3";
package payment.v1;

option java_package = "com.instacommerce.contracts.payment.v1";
option java_multiple_files = true;

import "common/v1/money.proto";

service PaymentService {
  rpc AuthorizePayment(AuthorizeRequest) returns (AuthorizeResponse);
  rpc CapturePayment(CaptureRequest) returns (CaptureResponse);
  rpc VoidAuthorization(VoidRequest) returns (VoidResponse);
  rpc RefundPayment(RefundRequest) returns (RefundResponse);
}

message AuthorizeRequest {
  string idempotency_key = 1;
  string order_id = 2;
  string user_id = 3;
  common.v1.Money amount = 4;
  string payment_method_id = 5;
}

message AuthorizeResponse {
  string payment_id = 1;
  bool authorized = 2;
  string decline_code = 3;
}

message CaptureRequest {
  string payment_id = 1;
}

message CaptureResponse {
  bool captured = 1;
  string psp_reference = 2;
}

message VoidRequest {
  string payment_id = 1;
}

message VoidResponse {
  bool voided = 1;
}

message RefundRequest {
  string payment_id = 1;
  common.v1.Money amount = 2;
  string reason = 3;
}

message RefundResponse {
  string refund_id = 1;
  bool refunded = 2;
}
