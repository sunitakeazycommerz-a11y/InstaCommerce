server:
  port: ${SERVER_PORT:8093}
  shutdown: graceful

spring:
  application:
    name: wallet-loyalty-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${WALLET_DB_URL:jdbc:postgresql://localhost:5432/wallets}
    username: ${WALLET_DB_USER:postgres}
    password: ${sm://db-password-wallet:${WALLET_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: wallet-loyalty-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=60s

wallet:
  consumer:
    payment-refund-enabled: ${WALLET_CONSUMER_PAYMENT_REFUND_ENABLED:false}
  jwt:
    issuer: ${WALLET_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${WALLET_JWT_PUBLIC_KEY}}
  loyalty:
    points-per-rupee: 1
    points-expiry-months: 12
  referral:
    reward-cents: 5000

payment-service:
  base-url: ${PAYMENT_SERVICE_URL:http://payment-service:8080}

order-service:
  base-url: ${ORDER_SERVICE_URL:http://order-service:8080}

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
