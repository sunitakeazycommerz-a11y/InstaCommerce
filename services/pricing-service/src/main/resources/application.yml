server:
  port: ${SERVER_PORT:8087}
  shutdown: graceful

spring:
  application:
    name: pricing-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${PRICING_DB_URL:jdbc:postgresql://localhost:5432/pricing}
    username: ${PRICING_DB_USER:postgres}
    password: ${sm://db-password-pricing:${PRICING_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: pricing-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

pricing:
  jwt:
    issuer: ${PRICING_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${PRICING_JWT_PUBLIC_KEY}}
  quote:
    hmac-secret: ${sm://pricing-quote-hmac-secret:${PRICING_QUOTE_HMAC_SECRET:dev-hmac-secret-change-in-prod}}
    ttl-seconds: ${PRICING_QUOTE_TTL_SECONDS:300}
    validation-enabled: ${PRICING_QUOTE_VALIDATION_ENABLED:true}

resilience4j:
  ratelimiter:
    instances:
      pricingLimiter:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 0s
      adminLimiter:
        limitForPeriod: 50
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}
