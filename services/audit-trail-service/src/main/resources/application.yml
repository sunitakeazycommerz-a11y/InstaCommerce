server:
  port: ${SERVER_PORT:8094}
  shutdown: graceful

spring:
  application:
    name: audit-trail-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_db}
    username: ${AUDIT_DB_USER:postgres}
    password: ${sm://db-password-audit:${AUDIT_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      max-lifetime: 1800000
      idle-timeout: 600000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${AUDIT_KAFKA_GROUP:audit-trail-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.interval.ms: 600000
        max.poll.records: 100
    listener:
      ack-mode: record

audit:
  jwt:
    issuer: ${AUDIT_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${AUDIT_JWT_PUBLIC_KEY}}
  partition:
    retention-days: ${AUDIT_PARTITION_RETENTION_DAYS:365}
    future-months: ${AUDIT_PARTITION_FUTURE_MONTHS:3}
  dlt-topic: ${AUDIT_DLT_TOPIC:audit.DLT}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
