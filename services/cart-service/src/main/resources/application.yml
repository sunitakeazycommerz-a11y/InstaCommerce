server:
  port: ${SERVER_PORT:8088}
  shutdown: graceful

spring:
  application:
    name: cart-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${CART_DB_URL:jdbc:postgresql://localhost:5432/carts}
    username: ${CART_DB_USER:postgres}
    password: ${sm://db-password-cart:${CART_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=50000,expireAfterWrite=3600s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

cart:
  jwt:
    issuer: ${CART_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${CART_JWT_PUBLIC_KEY}}
  max-items-per-cart: 50
  max-quantity-per-item: 10
  kafka:
    cart-events-topic: ${CART_EVENTS_TOPIC:cart-events}

pricing-service:
  base-url: ${PRICING_SERVICE_URL:http://pricing-service:8087}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN}
