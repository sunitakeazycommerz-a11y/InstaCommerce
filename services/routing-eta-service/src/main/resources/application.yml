server:
  port: ${SERVER_PORT:8092}
  shutdown: graceful

spring:
  application:
    name: routing-eta-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${ROUTING_DB_URL:jdbc:postgresql://localhost:5432/routing}
    username: ${ROUTING_DB_USER:postgres}
    password: ${sm://db-password-routing:${ROUTING_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    consumer:
      group-id: routing-eta-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100000,expireAfterWrite=10s

routing:
  jwt:
    issuer: ${ROUTING_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${ROUTING_JWT_PUBLIC_KEY}}
  eta:
    average-speed-kmh: ${ETA_AVG_SPEED_KMH:25}
    preparation-time-minutes: ${ETA_PREP_TIME_MINUTES:3}
    road-distance-multiplier: ${ETA_ROAD_DISTANCE_MULTIPLIER:1.4}
    peak-speed-multiplier: ${ETA_PEAK_SPEED_MULTIPLIER:0.6}
    night-speed-multiplier: ${ETA_NIGHT_SPEED_MULTIPLIER:1.2}
  breach:
    sla-threshold-minutes: ${ETA_SLA_THRESHOLD_MINUTES:30}
    breach-alert-threshold: ${ETA_BREACH_ALERT_THRESHOLD:0.7}
    eta-recalc-min-delta-minutes: ${ETA_RECALC_MIN_DELTA:2}
    eta-low-multiplier: ${ETA_LOW_MULTIPLIER:0.8}
    eta-high-multiplier: ${ETA_HIGH_MULTIPLIER:1.3}
    recalc-on-location-update-enabled: ${ETA_RECALC_ON_LOCATION_ENABLED:true}

google:
  maps:
    api-key: ${sm://google-maps-api-key:${GOOGLE_MAPS_API_KEY:CHANGE_ME}}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
