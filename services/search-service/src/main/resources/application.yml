server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful

spring:
  application:
    name: search-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SEARCH_DB_URL:jdbc:postgresql://localhost:5432/search}
    username: ${SEARCH_DB_USER:postgres}
    password: ${sm://db-password-search:${SEARCH_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 3000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      data-source-properties:
        options: "-c statement_timeout=5000"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: search-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.instacommerce.*
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=300s

search:
  jwt:
    issuer: ${SEARCH_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${SEARCH_JWT_PUBLIC_KEY}}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.instacommerce.search: ${LOG_LEVEL:INFO}
    org.springframework.kafka: WARN
