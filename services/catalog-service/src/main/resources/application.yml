server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: catalog-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${CATALOG_DB_URL:jdbc:postgresql://localhost:5432/catalog}
    username: ${CATALOG_DB_USER:postgres}
    password: ${sm://db-password-catalog:${CATALOG_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

catalog:
  jwt:
    issuer: ${CATALOG_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${CATALOG_JWT_PUBLIC_KEY}}

resilience4j:
  ratelimiter:
    instances:
      productLimiter:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 0s
      searchLimiter:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
