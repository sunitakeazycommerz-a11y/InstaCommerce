server:
  port: ${SERVER_PORT:8091}
  shutdown: graceful

spring:
  application:
    name: rider-fleet-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${RIDER_DB_URL:jdbc:postgresql://localhost:5432/rider_fleet}
    username: ${RIDER_DB_USER:postgres}
    password: ${sm://db-password-rider-fleet:${RIDER_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${RIDER_KAFKA_GROUP:rider-fleet-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cache:
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s

rider-fleet:
  jwt:
    issuer: ${RIDER_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${RIDER_JWT_PUBLIC_KEY}}
  assignment:
    default-radius-km: ${RIDER_ASSIGNMENT_RADIUS_KM:5.0}
  recovery:
    stuck-rider-enabled: ${RIDER_RECOVERY_STUCK_ENABLED:false}
    stuck-threshold-minutes: ${RIDER_RECOVERY_STUCK_THRESHOLD_MINUTES:60}
    batch-size: ${RIDER_RECOVERY_BATCH_SIZE:50}
    stuck-rider-cron: ${RIDER_RECOVERY_STUCK_CRON:0 */10 * * * *}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
