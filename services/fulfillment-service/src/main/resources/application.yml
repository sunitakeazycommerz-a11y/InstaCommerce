server:
  port: ${SERVER_PORT:8087}
  shutdown: graceful

spring:
  application:
    name: fulfillment-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${FULFILLMENT_DB_URL:jdbc:postgresql://localhost:5432/fulfillment}
    username: ${FULFILLMENT_DB_USER:postgres}
    password: ${sm://db-password-fulfillment:${FULFILLMENT_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${FULFILLMENT_KAFKA_GROUP:fulfillment-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

fulfillment:
  jwt:
    issuer: ${FULFILLMENT_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${FULFILLMENT_JWT_PUBLIC_KEY}}
  clients:
    order:
      base-url: ${ORDER_SERVICE_URL:http://localhost:8085}
    payment:
      base-url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
    inventory:
      base-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
    warehouse:
      base-url: ${WAREHOUSE_SERVICE_URL:http://localhost:8088}
  choreography:
    order-status-callback-enabled: ${FULFILLMENT_CHOREOGRAPHY_ORDER_STATUS_CALLBACK_ENABLED:true}
  delivery:
    default-eta-minutes: ${FULFILLMENT_DEFAULT_ETA_MINUTES:15}
  dispatch:
    inline-assignment-enabled: ${FULFILLMENT_DISPATCH_INLINE_ASSIGNMENT_ENABLED:false}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}
