server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful

spring:
  application:
    name: payment-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payments}
    username: ${PAYMENT_DB_USER:postgres}
    password: ${sm://db-password-payment:${PAYMENT_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

payment:
  jwt:
    issuer: ${PAYMENT_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${PAYMENT_JWT_PUBLIC_KEY}}
  choreography:
    order-cancelled-consumer-enabled: ${PAYMENT_CHOREOGRAPHY_ORDER_CANCELLED_CONSUMER_ENABLED:false}
    order-cancelled-topic: ${PAYMENT_CHOREOGRAPHY_ORDER_CANCELLED_TOPIC:orders.events}
    order-cancelled-consumer-group: ${PAYMENT_CHOREOGRAPHY_ORDER_CANCELLED_CONSUMER_GROUP:payment-service-order-cancelled}
  recovery:
    stale-pending-enabled: ${PAYMENT_STALE_PENDING_RECOVERY_ENABLED:false}
    stale-pending-cron: ${PAYMENT_STALE_PENDING_RECOVERY_CRON:0 */5 * * * *}
    stale-threshold-minutes: ${PAYMENT_STALE_PENDING_RECOVERY_THRESHOLD_MINUTES:30}
    batch-size: ${PAYMENT_STALE_PENDING_RECOVERY_BATCH_SIZE:50}

stripe:
  api-key: ${sm://stripe-api-key:${STRIPE_API_KEY}}
  webhook-secret: ${sm://stripe-webhook-secret:${STRIPE_WEBHOOK_SECRET}}
  connect-timeout-ms: ${STRIPE_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${STRIPE_READ_TIMEOUT_MS:15000}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}
