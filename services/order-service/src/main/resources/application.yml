server:
  port: ${SERVER_PORT:8085}
  shutdown: graceful

spring:
  application:
    name: order-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/orders}
    username: ${ORDER_DB_USER:postgres}
    password: ${sm://db-password-order:${ORDER_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

order:
  jwt:
    issuer: ${ORDER_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${ORDER_JWT_PUBLIC_KEY}}
  checkout:
    direct-saga-enabled: ${ORDER_CHECKOUT_DIRECT_SAGA_ENABLED:false}
  choreography:
    fulfillment-consumer-enabled: ${ORDER_CHOREOGRAPHY_FULFILLMENT_CONSUMER_ENABLED:false}
    fulfillment-topic: ${ORDER_CHOREOGRAPHY_FULFILLMENT_TOPIC:fulfillment.events}
    fulfillment-consumer-group: ${ORDER_CHOREOGRAPHY_FULFILLMENT_CONSUMER_GROUP:order-service-fulfillment}
  clients:
    inventory:
      base-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
    cart:
      base-url: ${CART_SERVICE_URL:http://localhost:8084}
    payment:
      base-url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
    pricing:
      base-url: ${PRICING_SERVICE_URL:http://localhost:8087}

temporal:
  service-address: "${TEMPORAL_HOST:localhost}:7233"
  namespace: ${TEMPORAL_NAMESPACE:instacommerce}
  task-queue: ${TEMPORAL_TASK_QUEUE:CHECKOUT_TASK_QUEUE}

resilience4j:
  ratelimiter:
    instances:
      checkoutLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}
