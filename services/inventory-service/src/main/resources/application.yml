server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

spring:
  application:
    name: inventory-service
  config:
    import: optional:sm://
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${INVENTORY_DB_USER:postgres}
    password: ${sm://db-password-inventory:${INVENTORY_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

inventory:
  jwt:
    issuer: ${INVENTORY_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${INVENTORY_JWT_PUBLIC_KEY}}
  low-stock-threshold: ${INVENTORY_LOW_STOCK_THRESHOLD:10}

reservation:
  ttl-minutes: ${INVENTORY_RESERVATION_TTL_MINUTES:5}
  expiry-check-interval-ms: ${INVENTORY_RESERVATION_EXPIRY_INTERVAL_MS:30000}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-in-prod}
