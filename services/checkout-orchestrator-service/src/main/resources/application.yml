server:
  port: ${SERVER_PORT:8089}
  shutdown: graceful

spring:
  application:
    name: checkout-orchestrator-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${CHECKOUT_DB_URL:jdbc:postgresql://localhost:5432/checkout}
    username: ${CHECKOUT_DB_USER:postgres}
    password: ${sm://db-password-checkout:${CHECKOUT_DB_PASSWORD}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

checkout:
  jwt:
    issuer: ${CHECKOUT_JWT_ISSUER:instacommerce-identity}
    public-key: ${sm://jwt-rsa-public-key:${CHECKOUT_JWT_PUBLIC_KEY}}
  clients:
    cart:
      base-url: ${CART_SERVICE_URL:http://localhost:8084}
      connect-timeout: 5000
      read-timeout: 10000
    pricing:
      base-url: ${PRICING_SERVICE_URL:http://localhost:8087}
      connect-timeout: 5000
      read-timeout: 10000
    inventory:
      base-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
      connect-timeout: 5000
      read-timeout: 10000
    payment:
      base-url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
      connect-timeout: 5000
      read-timeout: 10000
    order:
      base-url: ${ORDER_SERVICE_URL:http://localhost:8085}
      connect-timeout: 5000
      read-timeout: 10000

temporal:
  service-address: "${TEMPORAL_HOST:localhost}:7233"
  namespace: ${TEMPORAL_NAMESPACE:instacommerce}
  task-queue: ${TEMPORAL_TASK_QUEUE:CHECKOUT_ORCHESTRATOR_TASK_QUEUE}

management:
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.monitoring:4318/v1/traces}
    metrics:
      endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.monitoring:4318/v1/metrics}
  metrics:
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

resilience4j:
  circuitbreaker:
    instances:
      cartService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.RestClientException
      inventoryService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.RestClientException
      orderService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.RestClientException
      paymentService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.RestClientException
      pricingService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.RestClientException

internal:
  service:
    name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN}
