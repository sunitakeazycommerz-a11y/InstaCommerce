# Wave 36 Track B: Reconciliation Engine CDC Configuration
#
# This configuration can be used as:
# 1. Environment variables (prefixed with RC_)
# 2. Kubernetes ConfigMap
# 3. Docker environment file
#
# All values can be overridden via environment variables at runtime

# ============================================================================
# Service Configuration
# ============================================================================

# Port for HTTP server
PORT=8107
SERVER_PORT=8107

# Service name for observability (OTel)
OTEL_SERVICE_NAME=reconciliation-engine

# Log level: debug, info, warn, error
LOG_LEVEL=info

# ============================================================================
# Reconciliation Job Configuration
# ============================================================================

# Schedule: Go duration (e.g., "5m") or cron expression (e.g., "0 2 * * *" for 2 AM)
RECONCILIATION_SCHEDULE=5m

# Run reconciliation immediately on startup
RECONCILIATION_RUN_ON_STARTUP=true

# Timeout for a single reconciliation run
RECONCILIATION_TIMEOUT=2m

# ============================================================================
# Data Sources (File-based, for compatibility)
# ============================================================================

# Path to PSP (Payment Service Provider) export JSON file
# If empty, uses sample data
PSP_EXPORT_PATH=/data/psp-export.json

# Path to ledger snapshot JSON file
LEDGER_PATH=/data/ledger.json

# Path to write updated ledger after fixes applied
LEDGER_OUTPUT_PATH=/data/ledger.json

# Path to persist fix registry (idempotency tracking)
FIX_STATE_PATH=/data/fix-state.json

# ============================================================================
# Kafka Configuration - Event Publishing
# ============================================================================

# Kafka broker addresses (comma-separated)
KAFKA_BROKERS=kafka-0:9092,kafka-1:9092,kafka-2:9092

# Topic for publishing reconciliation events (mismatches, fixes, summaries)
KAFKA_TOPIC=reconciliation.events

# Client ID for Kafka producer
KAFKA_CLIENT_ID=reconciliation-engine

# ============================================================================
# Kafka Configuration - CDC Consumer
# ============================================================================

# Enable/disable CDC consumer
# Set to false to use only file-based ledger (backward compatibility)
CDC_ENABLED=true

# Kafka topics to consume CDC events from
# Multiple topics can be specified (comma-separated)
CDC_TOPICS=reconciliation.cdc

# Consumer group ID for CDC consumer
# All instances of reconciliation-engine should use the same group ID
CDC_GROUP_ID=reconciliation-cdc-consumer

# Minimum bytes to fetch per request (for batching)
CDC_MIN_BYTES=10240

# Maximum bytes to fetch per request (10 MB)
CDC_MAX_BYTES=10485760

# Maximum time to wait for CDC events before returning partial batch
CDC_MAX_WAIT=5s

# Interval for committing offsets to Kafka
CDC_COMMIT_INTERVAL=10s

# Number of CDC events to batch before processing
CDC_BATCH_SIZE=500

# Timeout for waiting to fill a batch
CDC_BATCH_TIMEOUT=5s

# ============================================================================
# Observability
# ============================================================================

# OpenTelemetry trace exporter endpoint (gRPC)
# Example: http://otel-collector:4317
OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317

# Prometheus metrics endpoint (scraped by prometheus)
# Exposed at /metrics on HTTP server

# ============================================================================
# Examples for Different Environments
# ============================================================================

# Development (local or Docker Compose):
# CDC_ENABLED=true
# KAFKA_BROKERS=localhost:9092
# PSP_EXPORT_PATH=./testdata/psp-export.json
# LEDGER_PATH=./testdata/ledger.json

# Staging (Kubernetes):
# CDC_ENABLED=true
# KAFKA_BROKERS=kafka-0.kafka.default.svc.cluster.local:9092,kafka-1.kafka.default.svc.cluster.local:9092,kafka-2.kafka.default.svc.cluster.local:9092
# LEDGER_PATH=/mnt/ledger/ledger.json
# LEDGER_OUTPUT_PATH=/mnt/ledger/ledger.json

# Production (Kubernetes with CDC):
# CDC_ENABLED=true
# CDC_GROUP_ID=reconciliation-cdc-consumer-prod
# RECONCILIATION_SCHEDULE=0 2 * * *  # Daily at 2 AM UTC
# LOG_LEVEL=info
# OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector.observability.svc.cluster.local:4317
