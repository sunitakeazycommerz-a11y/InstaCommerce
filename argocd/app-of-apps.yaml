apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: instacommerce
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/instacommerce
    targetRevision: main
    path: deploy/helm
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: instacommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
